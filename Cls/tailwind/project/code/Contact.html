<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savory Haven - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            scroll-behavior: smooth;
            border: transparent !important;

        }

        .dark-mode {
            background-color: #1a1a1a;
            color: #f5f5f5;
        }

        .dark-mode .bg-white {
            background-color: #2d2d2d !important;
        }

        .dark-mode .text-gray-800 {
            color: #f5f5f5 !important;
        }

        .dark-mode .text-gray-600 {
            color: #d1d1d1 !important;
        }

        .dark-mode .bg-gray-50 {
            background-color: #252525 !important;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .btn-hover {
            transition: all 0.3s ease;
        }

        .btn-hover:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body class="font-sans">

    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50 transition-all duration-300" style="border: 5px solid red;">
        <div class="container mx-auto px-6 py-4" style="border: 5px solid red;">
            <div class="flex justify-between items-center" style="border: 5px solid red;">
                <div class="text-2xl font-bold text-purple-600">Savory Haven</div>

                <div class="hidden md:flex space-x-8  items-center">
                    <a href="http://127.0.0.1:5500/Home.html"
                        class="text-gray-700 hover:text-purple-600 transition duration-300">Home</a>

                    <a href="http://127.0.0.1:5500/about.html"
                        class="text-gray-700 hover:text-purple-600 transition duration-300">About</a>

                    <a href="#" class="text-gray-700 hover:text-purple-600 transition duration-300">Contact</a>
                    <button onclick="toggleDarkMode()"
                        class="text-gray-700 hover:text-purple-600 transition duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                            </path>
                        </svg>
                    </button>
                    <button class="bg-purple-600 text-white px-6 py-2 rounded-full btn-hover">Login</button>
                    <button
                        class="bg-white text-purple-600 border-2 border-purple-600 px-6 py-2 rounded-full btn-hover">Sign
                        Up</button>
                </div>

                <button class="md:hidden" onclick="toggleMenu()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>

            <div id="mobileMenu" class="hidden md:hidden mt-4 space-y-3">
                <a href="http://127.0.0.1:5500/Home.html"
                    class="block text-gray-700 hover:text-purple-600 transition duration-300">Home</a>

                <a href="http://127.0.0.1:5500/about.html"
                    class=" block text-gray-700  hover:text-purple-600 transition duration-300">About</a>

                <a href="#" class="block text-gray-700 hover:text-purple-600 transition duration-300">Contact</a>
                <button class="w-full bg-purple-600 text-white px-6 py-2 rounded-full">Login</button>
                <button class="w-full bg-white text-purple-600 border-2 border-purple-600 px-6 py-2 rounded-full">Sign
                    Up</button>
            </div>
        </div>
    </nav>


    <!-- Contact Page -->
    <section id="contact" class="py-20 px-6" style="border: 5px solid red;">
        <div class="container mx-auto" style="border: 5px solid red;">
            <div class="max-w-2xl mx-auto" style="border: 10px solid rgb(0, 255, 13);">
                <h2 class="text-4xl font-bold text-center mb-12 text-gray-800" style="border: 5px solid red;">Contact Us
                </h2>
                <div class="bg-white rounded-xl shadow-lg p-8" style="border: 5px solid red;">
                    <form onsubmit="handleSubmit(event)" style="border: 5px solid red;">
                        <div class="mb-6">
                            <label for="name" class="block text-gray-700 font-semibold mb-2">Name</label>
                            <input type="text" id="name" placeholder="Your full name" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>

                        <div class="mb-6">
                            <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="email" placeholder="your.email@example.com" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>

                        <div class="mb-6">
                            <label for="phone" class="block text-gray-700 font-semibold mb-2">Phone</label>
                            <input type="tel" id="phone" placeholder="+1 (555) 123-4567" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
                        </div>

                        <div class="mb-6">
                            <label for="message" class="block text-gray-700 font-semibold mb-2">Message</label>
                            <textarea id="message" rows="5" placeholder="Tell us how we can help you..." required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600"></textarea>
                        </div>

                        <button type="submit"
                            class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold btn-hover">
                            Submit
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</body>
