<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>


    <div class="card bg-base-100 w-96 shadow-sm rounded-5" >
        <figure style=" margin-bottom: 15px;" >
            <img src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp" alt="Shoes" />
        </figure>
        <div class="card-body" style=" padding: 10px;">
            <h2 style=" padding: 10px;" class="card-title">Card Title</h2>
            <p style="padding: 10px; ">A card component has a figure, a body part, and inside body there are title and actions parts</p>
            <div style=" padding: 0; width: 95%; margin: 0 auto; " class="card-actions justify-end">
                <button style="  background-color: aqua; padding-top: 3px; padding-bottom: 3px; margin-top: 10px; width: 100%; border-radius: 5px;" class="btn btn-primary text-center">Buy Now</button>
            </div>
        </div>
    </div>

</body>

</html>
