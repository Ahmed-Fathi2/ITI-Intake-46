<div class="min-h-screen bg-gradient-to-br from-cyan-50 to-blue-100">
  <!-- Header -->
  <header class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-6">
      <h1 class="text-3xl font-bold text-cyan-600">Products Management</h1>
      <p class="text-gray-600 mt-1">Manage your product inventory</p>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-8">
    <!-- Loading Spinner -->
    <div *ngIf="loading()" class="flex justify-center items-center h-64">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-cyan-500"></div>
    </div>

    <!-- Products Grid -->
    <div *ngIf="!loading()" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
      <div *ngFor="let product of products()" (click)="viewProduct(product.id)"
        class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer overflow-hidden border border-gray-100 flex flex-col">
        <!-- Product Image Container -->
        <div class="relative h-64 overflow-hidden bg-gray-100">
          <img
            [src]="product.imageUrl || 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80'"
            [alt]="product.name"
            (error)="$any($event.target).src = 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80'"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <!-- Category Badge (Placeholder) -->
          <div class="absolute top-4 left-4">
            <span
              class="bg-white/90 backdrop-blur-md text-cyan-600 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm uppercase tracking-wider">
              Stationery
            </span>
          </div>
          <!-- Hover Overlay -->
          <div class="absolute inset-0 bg-black/5 group-hover:bg-black/0 transition-colors duration-300"></div>
        </div>

        <!-- Product Content -->
        <div class="p-6 flex-grow flex flex-col">
          <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold text-gray-800 group-hover:text-cyan-600 transition-colors line-clamp-1">
              {{ product.name }}
            </h3>
            <span class="text-2xl font-black text-cyan-600">${{ product.price }}</span>
          </div>

          <p class="text-gray-500 text-sm line-clamp-2 mb-6 flex-grow">
            {{ product.description }}
          </p>

          <!-- Footer -->
          <div class="flex items-center justify-between pt-4 border-t border-gray-50">
            <span class="text-xs font-mono text-gray-400 uppercase tracking-tighter">{{ product.productCode }}</span>
            <button class="text-cyan-600 font-bold text-sm flex items-center gap-1 group/btn">
              View Details
              <svg class="w-4 h-4 transform group-hover/btn:translate-x-1 transition-transform" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3">
                </path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading() && products().length === 0" class="text-center py-16">
      <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4">
        </path>
      </svg>
      <h3 class="text-2xl font-semibold text-gray-600 mb-2">No Products Found</h3>
      <p class="text-gray-500">Start by adding your first product</p>
    </div>
  </main>

  <!-- Floating Action Button -->
  <button (click)="createProduct()"
    class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-br from-cyan-500 to-blue-600 text-white rounded-full shadow-2xl hover:shadow-cyan-500/50 hover:scale-110 transition-all duration-300 flex items-center justify-center group"
    aria-label="Add Product">
    <svg class="w-8 h-8 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
    </svg>
  </button>
</div>
