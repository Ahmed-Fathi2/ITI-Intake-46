<div class="min-h-screen bg-gradient-to-br from-cyan-50 to-blue-100">
    <!-- Success Message -->
    <div *ngIf="showSuccessMessage()"
        class="fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg animate-bounce z-50">
        ✓ Product deleted successfully!
    </div>

    <!-- Loading Spinner -->
    <div *ngIf="loading()" class="flex justify-center items-center h-screen">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-cyan-500"></div>
    </div>

    <!-- Product Details -->
    <div *ngIf="!loading() && product()" class="container mx-auto px-4 py-8">
        <!-- Back Button -->
        <button (click)="goBack()"
            class="mb-6 flex items-center text-cyan-600 hover:text-cyan-700 font-semibold transition-colors">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to Products
        </button>

        <!-- Product Card -->
        <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="flex flex-col md:flex-row">
                <!-- Left: Product Image -->
                <div class="md:w-1/2 relative h-96 md:h-auto overflow-hidden bg-gray-50">
                    <img [src]="product()?.imageUrl || 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80'"
                        [alt]="product()?.name"
                        (error)="$any($event.target).src = 'https://images.unsplash.com/photo-1544816155-12df9643f363?auto=format&fit=crop&w=800&q=80'"
                        class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
                </div>

                <!-- Right: Product Info -->
                <div class="md:w-1/2 p-8 md:p-12 flex flex-col">
                    <div class="mb-8">
                        <span class="text-cyan-600 font-bold text-xs uppercase tracking-widest mb-2 block">Stationery
                            Collection</span>
                        <h1 class="text-4xl font-black text-gray-900 leading-tight mb-4">
                            {{ product()?.name }}
                        </h1>
                        <div class="flex items-center gap-4">
                            <span class="text-4xl font-black text-cyan-600">${{ product()?.price }}</span>
                            <span
                                class="bg-cyan-50 text-cyan-700 px-3 py-1 rounded-full text-xs font-bold border border-cyan-100 italic">In
                                Stock</span>
                        </div>
                    </div>

                    <div class="space-y-6 flex-grow">
                        <div>
                            <label
                                class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest">Description</label>
                            <p class="text-gray-600 leading-relaxed text-lg italic">
                                "{{ product()?.description }}"
                            </p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Product
                                    Code</label>
                                <span class="text-gray-900 font-mono font-bold">{{ product()?.productCode }}</span>
                            </div>
                            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">SKU ID</label>
                                <span class="text-gray-900 font-mono font-bold">#{{ product()?.id }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="mt-12 flex items-center gap-4">
                        <button (click)="updateProduct()"
                            class="flex-1 bg-gray-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-cyan-600 transition-all duration-300 shadow-xl shadow-gray-200 hover:shadow-cyan-200 transform hover:-translate-y-1 flex items-center justify-center gap-2 group">
                            <svg class="w-5 h-5 group-hover:rotate-12 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                </path>
                            </svg>
                            Edit
                        </button>

                        <button (click)="deleteProduct()"
                            class="bg-red-50 text-red-600 p-4 rounded-2xl font-bold hover:bg-red-600 hover:text-white transition-all duration-300 group border border-red-100">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
