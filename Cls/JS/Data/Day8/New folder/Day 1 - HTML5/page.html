<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Modern CSS Page</title>

    <style>
        /* ===== Reset أساسي ===== */
        /* نشيل المسافات الافتراضية */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* يخلي الحسابات أسهل */
        }

        /* ===== إعدادات الصفحة ===== */
        body {
            font-family: Arial, sans-serif; /* خط بسيط وواضح */
            background-color: #f4f6f8;      /* لون خلفية هادي */
            min-height: 100vh;              /* طول الصفحة قد الشاشة */
            display: flex;                  /* نستخدم flex */
            flex-direction: column;         /* العناصر تحت بعض */
            gap: 30px;                      /* مسافة بين الأقسام */
            padding: 30px;                  /* مسافة من أطراف الشاشة */
        }

        /* ===== Header ===== */
        .header {
            background-color: #ffffff; /* خلفية بيضا */
            padding: 20px;             /* مسافة داخلية */
            border-radius: 12px;       /* زوايا مدورة */
            display: flex;             /* flex للتحكم */
            justify-content: space-between; /* توزيع العناصر */
            align-items: center;       /* توسيط رأسي */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* ظل خفيف */
        }

        .header h1 {
            font-size: 22px; /* حجم العنوان */
        }

        /* ===== Buttons ===== */
        .btn {
            background-color: #4f46e5; /* لون مودرن */
            color: white;              /* لون الخط */
            border: none;              /* نشيل البوردر */
            padding: 10px 18px;        /* حجم الزر */
            border-radius: 8px;        /* تدوير الزوايا */
            cursor: pointer;           /* شكل اليد */
            transition: 0.3s;          /* حركة ناعمة */
        }

        /* تأثير عند المرور */
        .btn:hover {
            background-color: #3730a3; /* لون أغمق */
        }

        /* ===== Cards Section ===== */
        .cards {
            display: grid;                     /* Grid layout */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;                         /* مسافة بين الكروت */
        }

        .card {
            background-color: white; /* خلفية */
            padding: 20px;           /* مسافة داخلية */
            border-radius: 12px;     /* تدوير */
            box-shadow: 0 8px 20px rgba(0,0,0,0.08); /* ظل */
        }

        .card h3 {
            margin-bottom: 10px; /* مسافة تحت العنوان */
        }

        .card p {
            color: #555; /* لون هادي للنص */
            font-size: 14px;
        }

        /* ===== Form ===== */
        .form {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;          /* flex */
            flex-direction: column; /* العناصر تحت بعض */
            gap: 15px;              /* مسافات متساوية */
        }

        /* input & textarea */
        input, textarea {
            padding: 10px;          /* مسافة داخلية */
            border-radius: 6px;     /* تدوير */
            border: 1px solid #ccc; /* بوردر خفيف */
            font-size: 14px;
        }

        /* لما نضغط على input */
        input:focus, textarea:focus {
            outline: none;                 /* نشيل الخط الأزرق */
            border-color: #4f46e5;         /* لون مميز */
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>لوحة التحكم</h1>
        <button class="btn">تسجيل خروج</button>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>مستخدمين</h3>
            <p>إدارة المستخدمين والصلاحيات</p>
        </div>
        <div class="card">
            <h3>طلبات</h3>
            <p>متابعة حالة الطلبات</p>
        </div>
        <div class="card">
            <h3>تقارير</h3>
            <p>عرض الإحصائيات</p>
        </div>
    </div>

    <!-- Form -->
    <div class="form">
        <input type="text" placeholder="الاسم">
        <input type="email" placeholder="البريد الإلكتروني">
        <textarea rows="4" placeholder="رسالتك"></textarea>
        <button class="btn">إرسال</button>
    </div>

</body>
</html>
