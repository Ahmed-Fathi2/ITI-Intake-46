<!DOCTYPE html>
<html lang="ar">

<head>

    <title>Centered Buttons</title>

        html,
        body {
            height: 100%;
            margin: 0;
            box-sizing: border-box;
            
        }

        body {
            display: flex;
            justify-content: center;
        
            align-items: center;
       
        }

        /* .buttons {
            display: flex;
            flex-direction: column;
          
            gap: 15px;
        } */

        button {
            width: 200px;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="buttons">
        <button>زر 1</button>
        <button>زر 2</button>
        <button>زر 3</button>
        <button>زر 4</button>
    </div>

</body>

</html>
