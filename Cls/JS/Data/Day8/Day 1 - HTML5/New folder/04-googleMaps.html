<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Map with User Location</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <style>
        /* Make the map fill the entire page */
        #map {
            height: 100vh;
            width: 100%;
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Global variable for the map
        let map;

        // Initialize the map with given coordinates
        async function initMap(lat, lng) {
            try {
                // Load the Maps and Marker libraries
                const { Map } = await google.maps.importLibrary("maps");
                const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

                // Create the map
                map = new Map(document.getElementById("map"), {
                    center: { lat: lat, lng: lng },
                    zoom: 15,
                });

                // Add a marker at the user's location
                new AdvancedMarkerElement({
                    map: map,
                    position: { lat: lat, lng: lng },
                    title: "Your Location"
                });
            } catch (err) {
                console.error("Error loading Google Maps libraries:", err);
            }
        }

        // Get user's current location
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        console.log("Latitude:", lat, "Longitude:", lng);

                        // Initialize map at user's location
                        initMap(lat, lng);
                    },
                    function(error) {
                        if (error.code === 1) {
                            alert("Please enable location services to see your location on the map.");
                        } else {
                            console.error("Geolocation error:", error);
                        }

                        // Default location (e.g., New York) if user denies permission
                        initMap(40.7128, -74.0060);
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
                // Default location if geolocation not supported
                initMap(40.7128, -74.0060);
            }
        }

        // Load Google Maps API with your API key
        (function loadGoogleMaps() {
            const apiKey = "AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg";
            const script = document.createElement("script");
            script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=getUserLocation&v=weekly&libraries=marker`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        })();
    </script>
</body>
</html>
