<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="projects">
    <div class="div-table">

        <table>
            <thead>
                <tr>

                    <th colspan="4">JavaScript Calculator</th>

                </tr>
            </thead>

            <tbody>

                <tr>
                    <td class="in" colspan="3"><input id="input" type="text" placeholder="EnterNumbers" autofocus></td>
                    <td><button id="equal">=</button></td>
                </tr>
                <tr>
                    <td><button id="btn1" value="1">1</button></td>
                    <td><button id="btn2" value="2">2</button></td>
                    <td><button id="btn3" value="3">3</button></td>
                    <td><button id="btnPlus" value="+">+</button></td>
                </tr>

                <tr>
                    <td><button id="btn4" value="4">4</button></td>
                    <td><button id="btn5" value="5">5</button></td>
                    <td><button id="btn6" value="6">6</button></td>
                    <td><button id="btnMinus" value="-">-</button></td>
                </tr>

                <tr>
                    <td><button id="btn7" value="7">7</button></td>
                    <td><button id="btn8" value="8">8</button></td>
                    <td><button id="btn9" value="9">9</button></td>
                    <td><button id="btnMul" value="*">*</button></td>
                </tr>

                <tr>
                    <td><button id="btnClear">C</button></td>
                    <td><button id="btn0" value="0">0</button></td>
                    <td><button id="btnDot" value=".">.</button></td>
                    <td><button id="btnDiv" value="/">/</button></td>
                </tr>




            </tbody>

    </div>


    </table>

</body>

</html>
