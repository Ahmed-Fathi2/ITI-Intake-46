<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>lap2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            padding: 20px;
        }

        h2 {
            margin: 15px 0;
            padding: 12px;
            background-color: #1e3a8a;
            color: white;
            border-radius: 8px;
        }

        #usersTabs {
            background-color: #e0e7ff;
            display: flex;
            gap: 10px;
            padding: 15px;
            justify-content: center;
            flex-wrap: wrap;
            border-radius: 10px;
        }

        button {
            border: none;
            background-color: #2563eb;
            color: white;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        #postsList {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            list-style: none;
            margin-top: 10px;
        }

        #postsList li {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

       
    </style>


</head>

<body>

    <h2> Users</h2>
    <div id="usersTabs"></div>

    <h2>Posts</h2>
    <ul id="postsList"></ul>

    <script src="script.js"></script>
</body>

</html>
