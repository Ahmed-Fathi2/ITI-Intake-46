<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Toast Notification</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center gap-4">

    <!-- Buttons for demo -->
    <button onclick="toast.success('تم تسجيل الدخول بنجاح')"
            class="px-4 py-2 bg-green-600 text-white rounded">
        Success
    </button>

    <button onclick="toast.error('حدث خطأ أثناء العملية')"
            class="px-4 py-2 bg-red-600 text-white rounded">
        Error
    </button>

    <button onclick="toast.warning('كلمة المرور ضعيفة')"
            class="px-4 py-2 bg-yellow-500 text-white rounded">
        Warning
    </button>

    <!-- Toast Container -->
    <div id="toast-container"
         class="fixed top-5 right-5 z-50 space-y-3">
    </div>

    <!-- Toast Script -->
    <script>
        const toast = {
            show(message, type = "success", duration = 3000) {

                const colors = {
                    success: "bg-green-100 text-green-800 border-green-300",
                    error: "bg-red-100 text-red-800 border-red-300",
                    warning: "bg-yellow-100 text-yellow-800 border-yellow-300"
                };

                const icons = {
                    success: "✔",
                    error: "✖",
                    warning: "⚠"
                };

                const container = document.getElementById("toast-container");

                const toastEl = document.createElement("div");
                toastEl.className = `
                    flex items-center gap-3
                    w-full max-w-sm p-4
                    border rounded-lg shadow
                    animate-fade
                    ${colors[type]}
                `;

                toastEl.innerHTML = `
                    <span class="text-lg">${icons[type]}</span>
                    <span class="text-sm flex-1">${message}</span>
                    <button class="font-bold" onclick="this.parentElement.remove()">×</button>
                `;

                container.appendChild(toastEl);

                setTimeout(() => {
                    toastEl.remove();
                }, duration);
            },

            success(msg) { this.show(msg, "success"); },
            error(msg) { this.show(msg, "error"); },
            warning(msg) { this.show(msg, "warning"); }
        };
    </script>

    <!-- Animation -->
    <style>
        @keyframes fade {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fade 0.3s ease;
        }
    </style>

</body>
</html>
